name: Daily Video Digest

on:
  schedule:
    # Pondělí a čtvrtek v 6:00 UTC = 8:00 CEST (léto) / 7:00 CET (zima)
    - cron: "0 6 * * 1,4"
  workflow_dispatch:   # ruční spuštění tlačítkem na GitHubu

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
        run: python search_and_send.py

      - name: Commit updated seen_videos.json
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add seen_videos.json
          git diff --staged --quiet || git commit -m "chore: update seen videos [skip ci]"
          git push
